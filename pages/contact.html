<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact | NEXANNA</title>

  <link rel="stylesheet" href="../assets/css/styles.css">
</head>

<body>

  <header>
    <h1>NEXANNA</h1>

    <nav>
      <a href="../index.html">Home</a>
      <a href="energy.html">Energy</a>
      <a href="ai.html">AI Systems</a>
      <a href="verve.html">Verve</a>
    </nav>
  </header>

  <main>

    <section>
      <h2>System Intake Portal</h2>

      <p>
        Submit your inquiry through the structured intake process.
      </p>
    </section>

    <section>

      <form
        name="nexanna-intake"
        method="POST"
        action="/pages/success.html"
        data-netlify="true"
        data-netlify-honeypot="bot-field">

        <!-- Required by Netlify -->
        <input type="hidden" name="form-name" value="nexanna-intake">

        <!-- Spam protection -->
        <p hidden>
          <label>
            Do not fill this field:
            <input name="bot-field">
          </label>
        </p>

        <div>
          <label for="name">Name</label><br>
          <input
            id="name"
            type="text"
            name="name"
            required>
        </div>

        <br>

        <div>
          <label for="email">Email</label><br>
          <input
            id="email"
            type="email"
            name="email"
            required>
        </div>

        <br>

        <div>
          <label for="category">Category</label><br>

          <select
            id="category"
            name="category"
            required>

            <option value="">Select an option</option>

            <option value="Energy & Mining">
              Energy & Mining
            </option>

            <option value="AI & IT Systems">
              AI & IT Systems
            </option>

            <option value="Verve Wellness">
              Verve Wellness
            </option>

            <option value="Investment Desk">
              Investment Desk
            </option>

          </select>
        </div>

        <br>

        <div>
          <label for="message">Message</label><br>

          <textarea
            id="message"
            name="message"
            rows="6"
            required></textarea>
        </div>

        <br>

        <button type="submit">
          Submit Request
        </button>

      </form>

    </section>

  </main>

  <footer>
    <p>
      © 2026 NEXANNA. Structured systems for energy, intelligence, and human infrastructure.
    </p>
  </footer>

</body>
</html>
